name: Deploy to DigitalOcean

on:
  push:
    branches: [main, staging]

# Serialize deploys: two quick pushes (e.g. a PR merge followed by a release
# push) otherwise race over the same compose containers on the droplet.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      # GitHub Secrets are the source of truth for the Mercure JWT keys.
      # Build a fresh .env locally with the current secret values, ship it to
      # the server, and atomically swap it in before the compose rebuild. The
      # rest of the server's .env (SERVER_NAME, MERCURE_HUB_URL) is preserved.
      - name: Sync Mercure JWT secrets into server .env
        env:
          SUB_KEY: ${{ secrets.MERCURE_SUBSCRIBER_JWT_KEY }}
          PUB_KEY: ${{ secrets.MERCURE_PUBLISHER_JWT_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
          DO_SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          set -euo pipefail
          if [ -z "$SUB_KEY" ] || [ -z "$PUB_KEY" ]; then
            echo "MERCURE_SUBSCRIBER_JWT_KEY / MERCURE_PUBLISHER_JWT_KEY missing in env-scoped secrets" >&2
            exit 1
          fi
          SSH_PORT=${DO_SSH_PORT:-22}
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$DO_USER@$DO_HOST" "cat $DO_APP_DIR/.env" > .env.current
          grep -vE '^(MERCURE_SUBSCRIBER_JWT_KEY|MERCURE_PUBLISHER_JWT_KEY)=' .env.current > .env.new || true
          printf 'MERCURE_SUBSCRIBER_JWT_KEY=%s\n' "$SUB_KEY" >> .env.new
          printf 'MERCURE_PUBLISHER_JWT_KEY=%s\n' "$PUB_KEY"  >> .env.new
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" .env.new "$DO_USER@$DO_HOST:$DO_APP_DIR/.env.new"
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$DO_USER@$DO_HOST" "mv $DO_APP_DIR/.env.new $DO_APP_DIR/.env && chmod 600 $DO_APP_DIR/.env"
          rm -f .env.current .env.new

      - name: Deploy
        env:
          BRANCH: ${{ github.ref_name }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
          DO_SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          SSH_PORT=${DO_SSH_PORT:-22}
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$DO_USER@$DO_HOST" "cd $DO_APP_DIR && DEPLOY_BRANCH=$BRANCH ./scripts/deploy.sh"
