name: Deploy app host

on:
  push:
    branches: [main, staging]
    # Only redeploy the app container when something it actually ships changes.
    # The static content site under `public/**` is hosted separately and deploys
    # via its own pull hook (see docs/split-hosting.md), so a content-only push
    # must NOT rebuild the container. Keep this list in sync with what the image
    # bakes in.
    paths:
      - 'app/**'
      - 'server/**'
      - 'Caddyfile'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'compose.prod.yaml'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.APP_HOST_SSH_KEY }}

      # GitHub Secrets are the source of truth for the Mercure JWT keys.
      # Build a fresh .env locally with the current secret values, ship it to
      # the server, and atomically swap it in before the compose rebuild. The
      # rest of the server's .env (SERVER_NAME, MERCURE_HUB_URL) is preserved.
      - name: Sync Mercure JWT secrets into server .env
        env:
          SUB_KEY: ${{ secrets.MERCURE_SUBSCRIBER_JWT_KEY }}
          PUB_KEY: ${{ secrets.MERCURE_PUBLISHER_JWT_KEY }}
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_SSH_PORT: ${{ secrets.APP_SSH_PORT }}
        run: |
          set -euo pipefail
          if [ -z "$SUB_KEY" ] || [ -z "$PUB_KEY" ]; then
            echo "MERCURE_SUBSCRIBER_JWT_KEY / MERCURE_PUBLISHER_JWT_KEY missing in env-scoped secrets" >&2
            exit 1
          fi
          SSH_PORT=${APP_SSH_PORT:-22}
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$APP_USER@$APP_HOST" "cat $APP_DIR/.env" > .env.current
          grep -vE '^(MERCURE_SUBSCRIBER_JWT_KEY|MERCURE_PUBLISHER_JWT_KEY)=' .env.current > .env.new || true
          printf 'MERCURE_SUBSCRIBER_JWT_KEY=%s\n' "$SUB_KEY" >> .env.new
          printf 'MERCURE_PUBLISHER_JWT_KEY=%s\n' "$PUB_KEY"  >> .env.new
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" .env.new "$APP_USER@$APP_HOST:$APP_DIR/.env.new"
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$APP_USER@$APP_HOST" "mv $APP_DIR/.env.new $APP_DIR/.env && chmod 600 $APP_DIR/.env"
          rm -f .env.current .env.new

      - name: Deploy
        env:
          BRANCH: ${{ github.ref_name }}
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_SSH_PORT: ${{ secrets.APP_SSH_PORT }}
        run: |
          SSH_PORT=${APP_SSH_PORT:-22}
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$APP_USER@$APP_HOST" "cd $APP_DIR && DEPLOY_BRANCH=$BRANCH ./scripts/deploy.sh"
