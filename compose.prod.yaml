services:
  app:
    ports:
      - '80:80'
      - '443:443'
      # HTTP/3 / QUIC is intentionally NOT published. Long-lived Mercure SSE
      # streams over QUIC get killed on mobile/weak-signal networks (carriers
      # deprioritize UDP, NAT rebinding breaks connection migration), leaving
      # rooms stuck on the disconnected indicator. HTTP/3 is also disabled in
      # the Caddyfile global block (`servers { protocols h1 h2 }`). See #118.
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - MERCURE_PUBLISHER_JWT_KEY=${MERCURE_PUBLISHER_JWT_KEY}
      - MERCURE_SUBSCRIBER_JWT_KEY=${MERCURE_SUBSCRIBER_JWT_KEY}
      - MERCURE_HUB_URL=${MERCURE_HUB_URL}
      - CHAT_DB_PATH=/data/chat.sqlite
      # Web push (VAPID). Mint once with `bun scripts/gen-vapid.mjs <contact>`
      # and put the three lines in .env. Leaving them unset disables push
      # cleanly (the /push* endpoints answer 503); nothing else is affected.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
    restart: unless-stopped
    # The FrankenPHP image's default HEALTHCHECK probes 127.0.0.1:2019 (the
    # Caddy admin API), which we deliberately disable via `admin off` in
    # Caddyfile (defense-in-depth against an in-container RCE reaching it).
    # Replace it with an HTTPS probe against our actual API: /api/stats is
    # unauthenticated, cheap, and proves Caddy + PHP + SQLite are all wired
    # up. --resolve forces curl to send SNI=$SERVER_NAME to 127.0.0.1 — a
    # plain `https://localhost/...` would get a TLS internal_error because
    # Caddy only has a cert for the public hostname.
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'curl -fsS --resolve "${SERVER_NAME}:443:127.0.0.1" "https://${SERVER_NAME}/api/stats" >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # no-new-privileges blocks setuid binaries / kernel privilege escalation
    # from inside the container. The container still runs as root internally
    # (FrankenPHP's default), so this is defense-in-depth: a PHP RCE can't
    # gain ambient privilege beyond what the container already has.
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/data
      # Code and landing assets are baked into the image at build time;
      # the bind-mount is for live-reload during local dev. Mounting them
      # read-only in production prevents a compromised container from
      # overwriting PHP source on the host (persistent backdoor surface).
      - ./server:/app/public/api:ro
      - ./public:/app/landing:ro
