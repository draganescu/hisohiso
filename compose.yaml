services:
  app:
    build: .
    # Host port is supplied by scripts/dev.mjs (`bun dev`), which derives a
    # stable per-worktree port from a hash of the worktree path so multiple
    # worktrees can run in parallel without colliding. Bound to 127.0.0.1 so
    # it never reaches the public interface — even in production where
    # compose.prod.yaml adds 80/443 alongside it, the dev port stays loopback-only.
    ports:
      - '127.0.0.1:${HISOHISO_PORT:-8087}:80'
    environment:
      - SERVER_NAME=:80
      # JWT keys are injected by scripts/dev.mjs (derived from the worktree
      # path so each worktree has stable, isolated keys). The !ChangeMe!
      # fallbacks intentionally cause the server to refuse to start when run
      # without the dev launcher — fail loud rather than ship a placeholder.
      - MERCURE_PUBLISHER_JWT_KEY=${MERCURE_PUBLISHER_JWT_KEY:-!ChangeMe!}
      - MERCURE_SUBSCRIBER_JWT_KEY=${MERCURE_SUBSCRIBER_JWT_KEY:-!ChangeMe!}
      - MERCURE_HUB_URL=http://localhost/.well-known/mercure
      - CHAT_DB_PATH=/data/chat.sqlite
      # VAPID keys for web push, minted + cached per-worktree by scripts/dev.mjs
      # (data/.vapid-dev.json). Absent keys simply disable push: the /push*
      # endpoints answer 503 and the rest of the server is unaffected.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      # Must be a real https:/mailto contact — Apple rejects localhost (BadJwtToken).
      - VAPID_SUBJECT=${VAPID_SUBJECT:-https://hisohiso.org}
    # Override the FrankenPHP base image's HEALTHCHECK, which probes
    # 127.0.0.1:2019 (the Caddy admin API). We deliberately disable that via
    # `admin off` in Caddyfile, so the default check is hard-failing in dev
    # and the container shows up as `unhealthy` even when serving fine.
    # /api/stats is unauthenticated, cheap, and proves Caddy + PHP + SQLite
    # are wired up. Plain HTTP (no --resolve / SNI dance like prod) because
    # the dev container only listens on :80. compose.prod.yaml has the
    # equivalent HTTPS override.
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'curl -fsS http://127.0.0.1/api/stats >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ./data:/data
      # ./server lives at /app/public/api in the image (FrankenPHP's worker
      # root is /app/public, so PHP code has to live under it).
      - ./server:/app/public/api
