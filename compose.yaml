services:
  app:
    build: .
    # 8087 is the local dev port. Bound to 127.0.0.1 so it never reaches
    # the public interface — even in production where compose.prod.yaml
    # adds 80/443 alongside it, the dev port stays loopback-only.
    ports:
      - '127.0.0.1:8087:80'
    environment:
      - SERVER_NAME=:80
      - MERCURE_PUBLISHER_JWT_KEY=!ChangeMe!
      - MERCURE_SUBSCRIBER_JWT_KEY=!ChangeMe!
      - MERCURE_HUB_URL=http://localhost/.well-known/mercure
      - CHAT_DB_PATH=/data/chat.sqlite
    volumes:
      - ./data:/data
      # ./server lives at /app/public/api in the image (FrankenPHP's worker
      # root is /app/public, so PHP code has to live under it).
      - ./server:/app/public/api
      - ./public:/app/landing
