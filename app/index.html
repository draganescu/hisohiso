<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>hisohiso — a private encrypted line</title>
    <meta name="description" content="A private encrypted line. Open a channel from a link, talk to a friend or to an agent on your machine. No account. No history on our server. Close the channel and it's gone." />
    <meta name="theme-color" content="#f3efe6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      // Pre-paint theme application — avoids a light-flash on dark-preferring
      // devices. Mirrors src/lib/theme.ts; kept tiny + dependency-free so it
      // runs before the bundle loads.
      (function () {
        try {
          var v = localStorage.getItem('hisohiso.theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = v === 'dark' || ((!v || v === 'system') && sys);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/fonts/riso-fonts.css" />
  </head>
  <body class="bg-bg text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
